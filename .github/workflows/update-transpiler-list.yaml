name: Update transpiler list

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  push:
    branches:
      - actions

concurrency:
  group: update-docs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate transpiler-datas.json
        run: |
          #!/usr/bin/bash
          cd "$GITHUB_WORKSPACE" || exit

          hash curl jq || exit

          api_url=https://api.github.com/repos
          file=MlogDocs/transpiler-datas.json
          date_updated=$(date -u +"%Y-%m-%d %H:%M:%S")

          mapfile -t repos < .github/transpiler-repos || exit

          first=true
          echo "{\"date_updated\": \"$date_updated\", \"repos\": [" > "$file"

          for line in "${repos[@]}"; do
              url=${line%%  *}
              name=${line##*  }

              repo=${url#*/*/*/}
              request_url=$api_url/$repo
              entry=$(curl "$request_url" | jq --arg short_name "$name" '{html_url, short_name: $short_name, description, owner: .owner.login, updated_at, stargazers_count}')
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then
                  echo "curl failed (${PIPESTATUS[0]})" >&2
                  exit "${PIPESTATUS[0]}"
              fi
              if $first; then
                  first=false
              else
                  echo ',' >> "$file"
              fi
              echo "$entry" >> "$file"
          done

          echo ']}' >> "$file"

          echo 'Update transpiler list finish!'

      - name: Check for actual changes (excluding date_updated)
        run: |
          # Extract the repos array from both old and new JSON, ignoring date_updated
          if [ -f MlogDocs/transpiler-datas.json ]; then
            # Get the repos array from git's version of the file (before our changes)
            git show HEAD:MlogDocs/transpiler-datas.json | jq '.repos' > /tmp/old_repos.json
          else
            # File doesn't exist yet, so there are definitely changes
            echo '[]' > /tmp/old_repos.json
          fi
          
          # Get the repos array from our newly generated file
          jq '.repos' MlogDocs/transpiler-datas.json > /tmp/new_repos.json
          
          # Compare the repos arrays
          if diff -q /tmp/old_repos.json /tmp/new_repos.json > /dev/null 2>&1; then
            echo "No changes in repo data detected"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "Changes detected in repo data"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Commit and push if changed
        if: env.HAS_CHANGES == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add MlogDocs/transpiler-datas.json
          git commit -m "Update transpiler-datas.json [automated]"
          git fetch origin
          git rebase origin/$GITHUB_REF_NAME
          git push
          echo "Changes committed and pushed"